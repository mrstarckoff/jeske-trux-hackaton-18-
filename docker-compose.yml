version: '3.9'

x-healthcheck: &default-healthcheck
  interval: 10s
  timeout: 3s
  retries: 10
  start_period: 10s

services:
  ocr_asr:
    build: ./services/ocr_asr
    container_name: ocr_asr
    command: uvicorn main:app --host 0.0.0.0 --port 8001
    restart: unless-stopped
    healthcheck:
      <<: *default-healthcheck
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]

  vector_search:
    build: ./services/vector_search
    container_name: vector_search
    command: uvicorn main:app --host 0.0.0.0 --port 8002
    restart: unless-stopped
    environment:
      BILLBOARD_CSV: /data/billboards.csv
    volumes:
      - ./data:/data:ro
    healthcheck:
      <<: *default-healthcheck
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]

  geo:
    build: ./services/geo
    container_name: geo
    command: uvicorn main:app --host 0.0.0.0 --port 8003
    restart: unless-stopped
    environment:
      BILLBOARD_CSV: /data/billboards.csv
    volumes:
      - ./data:/data:ro
    healthcheck:
      <<: *default-healthcheck
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')"]

  mock_db:
    build: ./services/mock_db
    container_name: mock_db
    command: uvicorn main:app --host 0.0.0.0 --port 8004
    restart: unless-stopped
    environment:
      BILLBOARD_CSV: /data/billboards.csv
    volumes:
      - ./data:/data:ro
    healthcheck:
      <<: *default-healthcheck
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/health')"]

  orchestrator:
    build: ./services/orchestrator
    container_name: orchestrator
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      OCR_ASR_URL: http://ocr_asr:8001
      VECTOR_URL: http://vector_search:8002
      GEO_URL: http://geo:8003
      MOCK_DB_URL: http://mock_db:8004
    depends_on:
      ocr_asr:
        condition: service_healthy
      vector_search:
        condition: service_healthy
      geo:
        condition: service_healthy
      mock_db:
        condition: service_healthy
    healthcheck:
      <<: *default-healthcheck
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
